#[planit 글로벌 룰 - 환경 설정]
#포트, DB 등 환경 설정은 이 파일에서 관리됩니다.

server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: planit-base-service

  config:
    import: "optional:file:.env[.properties]"
  
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${PLANIT_SCHEDULE_DB_URL:${SPRING_DATASOURCE_URL:jdbc:mariadb://planit-mariadb:3306/planit_schedule_db}}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}

  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
      ddl-auto: create #update
    show-sql: true
    defer-datasource-initialization: true  # data.sql을 Hibernate DDL 이후에 실행

  sql:
    init:
      mode: always  # data.sql 항상 실행 (기본값 embedded는 H2 전용)

# /actuator/health 로 접속하면 서버 생존 여부 반환
management:
  endpoints:
    web:
      base-path: /api/v1/base/actuator
      exposure:
        include: health, info

# ──────────────────────────────────────────────────────────────────
# gRPC 설정
# ──────────────────────────────────────────────────────────────────
grpc:
  # Schedule Service 자신의 gRPC 서버 포트 (다른 서비스에서 이 서비스를 호출할 때 사용)
  server:
    port: ${GRPC_SERVER_PORT:9092}

  # 외부 gRPC 서비스 클라이언트 설정
  client:
    # UserServiceGrpcClient의 @GrpcClient("user-service") 와 이름이 일치해야 함
    user-service:
      # User Service의 gRPC 서버 주소 (환경변수로 주입, 기본값: 로컬 테스트용)
      address: ${PLANIT_USER_SERVICE_GRPC_TARGET:${USER_SERVICE_GRPC_ADDRESS:static://planit-user-svc:9091}}
      negotiation-type: plaintext  # TLS 미사용 (내부 통신)
    
    # UserActionLogGrpcClient의 @GrpcClient("insight-service") 와 이름이 일치해야 함
    insight-service:
      # Insight Service의 gRPC 서버 주소 (환경변수로 주입, 기본값: 로컬 테스트용)
      address: ${PLANIT_INSIGHT_SERVICE_GRPC_TARGET:${INSIGHT_SERVICE_GRPC_ADDRESS:static://planit-insight-svc:9094}}
      negotiation-type: plaintext  # TLS 미사용 (내부 통신)
      # 타임아웃 설정 (행동 로그는 빠르게 처리되어야 함)
      deadline: 3s

  # stub-mode: true  → UserServiceGrpcClient가 항상 true 반환 (User Service 미연동 개발용)
  # stub-mode: false → 실제 gRPC 호출 (User Service 서버가 떠있어야 함)
  stub-mode: ${GRPC_STUB_MODE:false}

# JWT 설정 (User-svc와 동일한 시크릿 사용 필수)
jwt:
  secret: ${JWT_SECRET:planit-user-service-secret-key-change-in-production-please}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:900000}

# CORS 허용 Origin
cors:
  allowed-origins: ${PLANIT_CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS:https://planit.example.com}}
