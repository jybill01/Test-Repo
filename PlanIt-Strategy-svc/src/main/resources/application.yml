#[planit 글로벌 룰 - 환경 설정]
#포트, DB 등 환경 설정은 이 파일에서 관리됩니다.
#민감한 정보는 환경변수로 주입하세요.

server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: planit-strategy-service

  config:
    import: "optional:file:.env[.properties]"
  
  datasource:
    url: ${PLANIT_STRATEGY_DB_URL:${SPRING_DATASOURCE_URL:jdbc:mariadb://planit-mariadb:3306/planit_strategy_db}}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: Asia/Seoul
  
  sql:
    init:
      mode: always
      continue-on-error: true

# AWS 설정
aws:
  region: ${AWS_REGION:ap-northeast-2}
  credentials:
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
  bedrock:
    model-id: ${BEDROCK_MODEL_ID:anthropic.claude-3-5-sonnet-20240620-v1:0}


bedrock:
  temperature: ${BEDROCK_TEMPERATURE:0.7}

# GNews API 설정
gnews:
  api-key: ${GNEWS_API_KEY:d615b66ab942e55581c25c226af96009}
  base-url: https://gnews.io/api/v4

# /actuator/health 로 접속하면 서버 생존 여부 반환
management:
  endpoints:
    web:
      base-path: /api/v1/strategy/actuator
      exposure:
        include: health, info

# 로깅 설정
logging:
  level:
    root: INFO
    com.planit.strategy: DEBUG
    software.amazon.awssdk: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# <-> Schedule Service gRPC 통신
grpc:
  server:
    port: ${GRPC_SERVER_PORT:9093}
  client:
    schedule-service:
      address: ${PLANIT_SCHEDULE_SERVICE_GRPC_TARGET:${GRPC_SCHEDULE_SERVICE_ADDRESS:static://planit-schedule-svc:9092}}
      negotiation-type: plaintext
    user-service:
      address: ${PLANIT_USER_SERVICE_GRPC_TARGET:${USER_SERVICE_GRPC_ADDRESS:static://planit-user-svc:9091}}
      negotiation-type: plaintext

jwt:
  secret: ${JWT_SECRET:planit-user-service-secret-key-change-in-production-please}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:900000}

cors:
  allowed-origins: ${PLANIT_CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS:https://planit.example.com}}
