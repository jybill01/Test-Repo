spring:
  data:
    redis:
      # Redis 연결 비활성화 (로컬 테스트용)
      host: ${PLANIT_REDIS_HOST:${REDIS_HOST:planit-redis}}
      port: 6379
      timeout: 3000ms
  redis:
    # Redis 자동 설정 비활성화
    enabled: false
  security:
    user:
      name: admin
      password: admin

# Redis 없이 실행하기 위한 설정
management:
  health:
    redis:
      enabled: false
