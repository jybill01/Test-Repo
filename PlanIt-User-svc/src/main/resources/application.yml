#[planit 글로벌 룰 - 환경 설정]
#포트, DB 등 환경 설정은 이 파일에서 관리됩니다.

server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: planit-user-service

  config:
    import: "optional:file:.env[.properties]"
  
  # Spring MVC 패턴 매칭 전략 (Swagger UI 호환성)
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${PLANIT_USER_DB_URL:${SPRING_DATASOURCE_URL:jdbc:mariadb://planit-mariadb:3306/planit_user_db}}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
      ddl-auto: create
    defer-datasource-initialization: true  # data.sql을 Hibernate DDL 이후에 실행
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  
  # Redis 설정 (Refresh Token 저장용)
  data:
    redis:
      host: ${PLANIT_REDIS_HOST:${REDIS_HOST:planit-redis}}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms

# JWT 설정
jwt:
  secret: ${JWT_SECRET:planit-user-service-secret-key-change-in-production-please}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
  # JwtProvider.java 호환용 별칭
  access-token-validity: 900000
  refresh-token-validity: 604800000


# AWS Cognito 설정
aws:
  region: ${AWS_REGION:ap-northeast-2}
  credentials:
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
  cognito:
    user-pool-id: ${COGNITO_USER_POOL_ID:}
    client-id: ${COGNITO_CLIENT_ID:}
    region: ${AWS_REGION:ap-northeast-2}


# Springdoc OpenAPI 설정
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# gRPC 서버 포트
grpc:
  server:
    port: ${GRPC_SERVER_PORT:9091}

# /actuator/health 로 접속하면 서버 생존 여부 반환
management:
  endpoints:
    web:
      base-path: /api/v1/users/actuator
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized
